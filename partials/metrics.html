<!-- Welcome Section -->
<div class="hero bg-gradient-to-br from-primary to-secondary text-primary-content rounded-3xl p-8 mb-8 shadow-lg relative overflow-hidden">
  <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -translate-y-32 translate-x-32 pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-48 h-48 bg-black/10 rounded-full translate-y-24 -translate-x-24 pointer-events-none"></div>

  <div class="relative z-10">
    <div class="hero-content flex-col lg:flex-row gap-8">
      <div class="max-w-lg">
        <h1 class="text-2xl lg:text-3xl font-bold mb-3">Welcome back, John! 👋</h1>
        <p class="text-base lg:text-lg opacity-90 mb-4">Here's what's happening with your fitness business today.</p>
        <div class="flex flex-col sm:flex-row gap-3">
          <button class="btn btn-primary btn-md sm:btn-lg rounded-lg">
            <i class="ph ph-plus"></i> Add Member
          </button>
          <button class="btn btn-outline btn-md sm:btn-lg rounded-lg">
            <i class="ph ph-calendar-plus"></i> Schedule Class
          </button>
        </div>
      </div>
      <div class="hidden lg:block">
        <div class="w-48 h-48 bg-white/20 rounded-full flex items-center justify-center">
          <i class="ph-bold ph-chart-pie-slice text-8xl opacity-80"></i>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Stats Grid -->
<div class="stats stats-vertical lg:stats-horizontal shadow w-full bg-base-100 rounded-box border border-base-300 mb-8">
  <div class="stat">
    <div class="stat-title">Total Members</div>
    <div class="stat-value text-primary">247</div>
    <div class="stat-desc">
      <i class="ph ph-arrow-up"></i> 12% from last month
    </div>
  </div>

  <div class="stat">
    <div class="stat-title">Monthly Revenue</div>
    <div class="stat-value text-error">$12.4k</div>
    <div class="stat-desc">
      <i class="ph ph-arrow-up"></i> 8% from last month
    </div>
  </div>

  <div class="stat">
    <div class="stat-title">Today's Classes</div>
    <div class="stat-value text-info">8</div>
    <div class="stat-desc">
      <i class="ph ph-minus"></i> 0% change
    </div>
  </div>

  <div class="stat">
    <div class="stat-title">Active Rate</div>
    <div class="stat-value text-success">89%</div>
    <div class="stat-desc">
      <i class="ph ph-arrow-up"></i> 5% from last month
    </div>
  </div>
</div>
